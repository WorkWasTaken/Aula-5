<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>StreetCoffee: Contatos</title>
    <form>
        <fieldset>
            <legend>Solicitar Reserva</legend>
            <div class="form-grid">
              <Label for="nome">Nome</Label>
              <input type="text" id="nome" required>
            </div>
            <div class="form-grid">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="voce@exemplo.com">
            </div>
            <div class="form-grid">
              <label for="datareserva">Data de reserva</label>
              <input type="date" id="datareserva" required>
            </div>
            <div class="form-grid">
              <label for="npessoa">Número de pessoas</label>
              <input type="number" min="1" max="10" required>
            </div>
            <div class="form-grid">
              <Label for="tel">Telefone</Label>
              <input type="tel" id="tel" placeholder="(xx) xx xxxxx-xxxx" required>
            </div>
            <button type="submit">Confirmar Reserva</button>

        </fieldset>
    </form>
